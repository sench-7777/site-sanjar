<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Register</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<body class="bg-secondary"> 

<div class="container form-control w-50 mt-5">
  <div class="row justify-content-center">

    <div class="col-md-6 col-lg-4">

        <h4 class="text-center mb-2">Register</h4>
        <p class="text-center text-muted small">
          Shaxsiy akkauntingizni yarating.
        </p>

        <form>

          <div class="row mb-2">
            <div class="col">
              <input type="text" class="form-control" placeholder="Ismingiz">
            </div>
            <div class="col">
              <input type="text" class="form-control" placeholder="Familiyangiz">
            </div>
          </div>

          <input type="email" class="form-control mb-2" placeholder="Email">

          <input type="password" class="form-control mb-2" placeholder="Parol">

          <input type="password" class="form-control mb-3" placeholder="Parolni tasdiqlash">

          <div class="form-check mb-3">
            <input class="form-check-input" type="checkbox">
            <label class="form-check-label">
              Men shu yerda<span class="text-success">yozilganlarni tasdiqlayman</span>
            </label>
          </div>

          <button class="btn btn-success w-100">Hoziroq ro'yxatdan otish</button>

        </form>

      </div>

      <p class="text-center mt-3 small text-white">
        avval registratsiya qilganmisiz? <a href="#" class="text-white">Kirish</a>
      </p>

    </div>

  </div>
</div>

</body>
</html>
